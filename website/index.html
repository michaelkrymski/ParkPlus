<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ParkPlus</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>

<body>

    <h1>ParkPlus</h1>

    <div style="display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap;">
        <div>
            <label>Destination address</label><br>
            <input type="text" id="address" placeholder="e.g. Ben Hill Griffin Stadium, Gainesville FL">
        </div>
        <div>
            <label>Number of results</label><br>
            <input type="number" id="numResults" value="10" min="1" max="20">
        </div>
        <button id="searchBtn" onclick="search()">Search</button>
    </div>
    <div class="progress-wrap" id="progress-wrap">
        <div class="progress-label" id="progress-label">Searching...</div>
        <div class="progress-track">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div id="error" class="error"></div>

    <div class="results">
        <div class="column">
            <h2>Dijkstra</h2>
            <div id="map-dj" class="map"></div>
            <div id="dijkstra-results"></div>
        </div>
        <div class="column">
            <h2>A*</h2>
            <div id="map-astar" class="map"></div>
            <div id="astar-results"></div>
        </div>
    </div>

    <script>
        let maps = {};

        function plotMap(elementId, results, destLat, destLon) {
            if (!maps[elementId]) {
                maps[elementId] = L.map(elementId).setView([destLat, destLon], 14);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: 'Credit: OpenStreetMap'
                }).addTo(maps[elementId]);
            }

            const map = maps[elementId];
            map.eachLayer(layer => { if (layer instanceof L.CircleMarker) map.removeLayer(layer); });

            L.circleMarker([destLat, destLon], { radius: 10, color: '#e53e3e', fillColor: '#e53e3e', fillOpacity: 1 })
                .addTo(map).bindPopup("<b>Your destination</b>");

            const bounds = [[destLat, destLon]];
            for (let i = 0; i < results.length; i++) {
                const r = results[i];
                const distStr = parseFloat(r.distance) >= 1000
                    ? (parseFloat(r.distance) / 1000).toFixed(2) + " km"
                    : Math.round(parseFloat(r.distance)) + " m";
                L.circleMarker([parseFloat(r.lat), parseFloat(r.lon)], { radius: 8, color: '#3182ce', fillColor: '#3182ce', fillOpacity: 0.8 })
                    .addTo(map).bindPopup(`
                        <b>#${i + 1}</b><br> 
                        Type: ${r.type}<br>
                        Distance: ${distStr}<br>
                        Coords: ${parseFloat(r.lat).toFixed(5)}, ${parseFloat(r.lon).toFixed(5)}<br>
                        <a href="https://www.google.com/maps?q=${r.lat},${r.lon}" target="_blank">View on Google Maps</a>
                    `); // Number, type, distance, coords, and link to Google Maps.
                bounds.push([parseFloat(r.lat), parseFloat(r.lon)]);
            }
            map.fitBounds(bounds, { padding: [30, 30] });
        }

        let progressInterval = null;

        function startProgress() {
            const bar = document.getElementById("progress-bar");
            const label = document.getElementById("progress-label");
            document.getElementById("progress-wrap").classList.add("visible");
            bar.style.width = "0%";
            let progressEstimate = 0;
            progressInterval = setInterval(() => {
                progressEstimate = Math.min(progressEstimate + (Math.random() * 2.8), 98); // Roughly estimate based on past runtime on this computer and jump at end.
                bar.style.width = progressEstimate + "%";
                label.innerText = progressEstimate < 30 ? "Loading graph..." : progressEstimate < 60 ? "Running algorithms..." : "Collecting results...";
            }, 500);
        }

        function endProgress() {
            clearInterval(progressInterval);
            document.getElementById("progress-bar").style.width = "100%";
            setTimeout(() => { document.getElementById("progress-wrap").classList.remove("visible"); }, 600);
        }

        async function search() {
            document.getElementById("error").innerText = "";
            document.getElementById("dijkstra-results").innerHTML = "Loading...";
            document.getElementById("astar-results").innerHTML = "Loading...";
            document.getElementById("map-dj").style.display = "none";
            document.getElementById("map-astar").style.display = "none";

            const address = document.getElementById("address").value;
            const numResults = parseInt(document.getElementById("numResults").value);

            startProgress();
            document.getElementById("searchBtn").disabled = true;

            const response = await fetch("/search", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ address, numResults })
            });

            const data = await response.json();

            endProgress();
            document.getElementById("searchBtn").disabled = false;

            if (data.error) {
                document.getElementById("error").innerText = data.error;
                document.getElementById("dijkstra-results").innerHTML = "";
                document.getElementById("astar-results").innerHTML = "";
                return;
            }

            document.getElementById("map-dj").style.display = "block";
            document.getElementById("map-astar").style.display = "block";
            displayResults("dijkstra-results", data.dijkstra);
            displayResults("astar-results", data.astar);
            plotMap("map-dj", data.dijkstra, data.lat, data.lon);
            plotMap("map-astar", data.astar, data.lat, data.lon);

            // Test add delay to render maps
            // setTimeout(() => {
            //     maps["map-dj"].invalidateSize();
            //     maps["map-astar"].invalidateSize();
            // }, 100);
        }

        function displayResults(elementId, results) {
            const container = document.getElementById(elementId);
            container.innerHTML = "";

            for (let i = 0; i < results.length; i++) {
                const r = results[i];
                const distanceM = parseFloat(r.distance);
                const distanceStr = distanceM >= 1000
                    ? (distanceM / 1000).toFixed(2) + " km"
                    : Math.round(distanceM) + " m";

                const mapsUrl = `https://www.google.com/maps?q=${r.lat},${r.lon}`;

                container.innerHTML +=
                    `<div class="card">
                    <h3>#${i + 1} — Node ${r.id}</h3>
                    <p>Type: ${r.type}</p>
                    <p>Distance: ${distanceStr}</p>
                    <p>Coordinates: ${parseFloat(r.lat).toFixed(5)}, ${parseFloat(r.lon).toFixed(5)}</p>
                    <a href="${mapsUrl}" target="_blank">View on Google Maps</a>
                </div>`;
            }
        }
    </script>

</body>

</html>
