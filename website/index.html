<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ParkPlus</title>
</head>

<body>

    <h1>ParkPlus</h1>

    <div>
        <label>Destination address</label><br>
        <input type="text" id="address" placeholder="e.g. Ben Hill Griffin Stadium, Gainesville FL"><br>
        <label>Number of results</label><br>
        <input type="number" id="numResults" value="10" min="1" max="20"><br>
        <button onclick="search()">Search</button>
    </div>

    <div id="error" class="error"></div>

    <div class="results">
        <div class="column">
            <h2>Dijkstra</h2>
            <div id="dijkstra-results"></div>
        </div>
        <div class="column">
            <h2>A*</h2>
            <div id="astar-results"></div>
        </div>
    </div>

    <script>
        async function search() {
            document.getElementById("error").innerText = "";
            document.getElementById("dijkstra-results").innerHTML = "Loading...";
            document.getElementById("astar-results").innerHTML = "Loading...";

            const address = document.getElementById("address").value;
            const numResults = parseInt(document.getElementById("numResults").value);

            const response = await fetch("/search", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ address, numResults })
            });

            const data = await response.json();

            if (data.error) {
                document.getElementById("error").innerText = data.error;
                document.getElementById("dijkstra-results").innerHTML = "";
                document.getElementById("astar-results").innerHTML = "";
                return;
            }

            displayResults("dijkstra-results", data.dijkstra);
            displayResults("astar-results", data.astar);
        }

        function displayResults(elementId, results) {
            const container = document.getElementById(elementId);
            container.innerHTML = "";

            for (let i = 0; i < results.length; i++) {
                const r = results[i];
                const distanceM = parseFloat(r.distance);
                const distanceStr = distanceM >= 1000
                    ? (distanceM / 1000).toFixed(2) + " km"
                    : Math.round(distanceM) + " m";

                const mapsUrl = `https://www.google.com/maps?q=${r.lat},${r.lon}`;

                container.innerHTML +=

                    `<div class="card">
                    <h3>#${i + 1} — Node ${r.id}</h3>
                    <p>Type: ${r.type}</p>
                    <p>Distance: ${distanceStr}</p>
                    <p>Coordinates: ${parseFloat(r.lat).toFixed(5)}, ${parseFloat(r.lon).toFixed(5)}</p>
                    <a href="${mapsUrl}" target="_blank">View on Google Maps</a>
                </div>`
                    ;
            }
        }

    </script>

</body>

</html>
